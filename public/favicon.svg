<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#b91c1c"/>
  <g fill="#ffffff">
    <!-- Outer H pillars -->
    <rect x="10" y="14" width="13" height="72"/>
    <rect x="77" y="14" width="13" height="72"/>
    <!-- Inner I serifs (top and bottom) -->
    <rect x="29" y="14" width="42" height="13"/>
    <rect x="29" y="73" width="42" height="13"/>
    <!-- Inner I pillars -->
    <rect x="33" y="14" width="13" height="72"/>
    <rect x="54" y="14" width="13" height="72"/>
    <!-- H crossbar (connects outer pillars through center) -->
    <rect x="10" y="44" width="80" height="12"/>
  </g>
</svg>
