<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="darkWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="canopy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="thatch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a16207"/>
      <stop offset="100%" stop-color="#713f12"/>
    </linearGradient>
    <pattern id="floor" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#a16207"/>
      <line x1="0" y1="0" x2="20" y2="0" stroke="#78350f" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="#78350f" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Sky background -->
  <rect width="1000" height="600" fill="url(#sky)"/>

  <!-- Outer wooden O (galleries cross-section) -->
  <ellipse cx="500" cy="380" rx="460" ry="180" fill="url(#wood)" stroke="#451a03" stroke-width="3"/>

  <!-- Thatched roof over galleries (back half) -->
  <path d="M 60 380 Q 60 240 200 220 L 800 220 Q 940 240 940 380 Z" fill="url(#thatch)" stroke="#451a03" stroke-width="2"/>

  <!-- Yard (groundling pit, open to the sky) -->
  <ellipse cx="500" cy="440" rx="280" ry="80" fill="#92400e" opacity="0.5"/>
  <rect x="220" y="440" width="560" height="120" fill="#a16207" opacity="0.4"/>

  <!-- Three tiers of galleries (left side cutaway) -->
  <g stroke="#451a03" stroke-width="2" fill="none">
    <!-- Gallery 1 (top) -->
    <line x1="60" y1="280" x2="940" y2="280"/>
    <!-- Gallery 2 (middle) -->
    <line x1="60" y1="330" x2="940" y2="330"/>
    <!-- Gallery 3 (bottom) -->
    <line x1="60" y1="380" x2="940" y2="380"/>
  </g>

  <!-- Vertical posts in galleries -->
  <g stroke="#451a03" stroke-width="2" opacity="0.7">
    <line x1="160" y1="240" x2="160" y2="380"/>
    <line x1="280" y1="230" x2="280" y2="380"/>
    <line x1="720" y1="230" x2="720" y2="380"/>
    <line x1="840" y1="240" x2="840" y2="380"/>
  </g>

  <!-- Tiring house (back wall) -->
  <rect x="370" y="200" width="260" height="240" fill="url(#darkWood)" stroke="#1c1917" stroke-width="3"/>

  <!-- Tiring house decorative columns -->
  <rect x="380" y="200" width="14" height="240" fill="#451a03"/>
  <rect x="606" y="200" width="14" height="240" fill="#451a03"/>
  <rect x="490" y="200" width="20" height="240" fill="#1c1917"/>

  <!-- Stage doors (left and right of tiring house) -->
  <rect x="402" y="350" width="44" height="90" fill="#1c1917" rx="2"/>
  <rect x="554" y="350" width="44" height="90" fill="#1c1917" rx="2"/>

  <!-- Upper acting space / "balcony" / minstrels' gallery -->
  <rect x="402" y="240" width="196" height="80" fill="#fde68a" stroke="#451a03" stroke-width="2"/>
  <line x1="402" y1="320" x2="598" y2="320" stroke="#451a03" stroke-width="3"/>
  <!-- Balcony rail balusters -->
  <g stroke="#451a03" stroke-width="2">
    <line x1="430" y1="305" x2="430" y2="320"/>
    <line x1="460" y1="305" x2="460" y2="320"/>
    <line x1="490" y1="305" x2="490" y2="320"/>
    <line x1="510" y1="305" x2="510" y2="320"/>
    <line x1="540" y1="305" x2="540" y2="320"/>
    <line x1="570" y1="305" x2="570" y2="320"/>
  </g>

  <!-- Heavens canopy over the thrust stage -->
  <path d="M 340 250 L 660 250 L 700 280 L 700 320 L 300 320 L 300 280 Z" fill="url(#canopy)" stroke="#1c1917" stroke-width="3"/>
  <!-- Sun and moon painted on underside of heavens -->
  <circle cx="430" cy="295" r="10" fill="#fbbf24"/>
  <text x="430" y="299" text-anchor="middle" font-size="10" fill="#1c1917" font-family="serif">☀</text>
  <circle cx="570" cy="295" r="9" fill="#e7e5e4"/>
  <text x="570" y="299" text-anchor="middle" font-size="10" fill="#1c1917" font-family="serif">☾</text>

  <!-- Two pillars holding up the heavens (Hercules + Atlas pillars) -->
  <rect x="296" y="315" width="14" height="170" fill="url(#darkWood)" stroke="#1c1917" stroke-width="2"/>
  <rect x="690" y="315" width="14" height="170" fill="url(#darkWood)" stroke="#1c1917" stroke-width="2"/>

  <!-- Thrust stage (apron) -->
  <polygon points="280,440 720,440 760,490 240,490" fill="url(#floor)" stroke="#451a03" stroke-width="3"/>
  <!-- Stage edge -->
  <line x1="240" y1="490" x2="760" y2="490" stroke="#1c1917" stroke-width="3"/>

  <!-- Trap door on stage -->
  <rect x="475" y="455" width="50" height="20" fill="#1c1917" stroke="#451a03" stroke-width="1.5" opacity="0.8"/>
  <line x1="500" y1="455" x2="500" y2="475" stroke="#451a03" stroke-width="1"/>

  <!-- Lord's room (above the upper acting space) -->
  <rect x="430" y="200" width="140" height="38" fill="#7f1d1d" opacity="0.85" stroke="#1c1917" stroke-width="2"/>

  <!-- Flag pole and flag -->
  <line x1="500" y1="200" x2="500" y2="120" stroke="#1c1917" stroke-width="3"/>
  <polygon points="500,125 560,140 500,155" fill="#b91c1c" stroke="#1c1917" stroke-width="1.5"/>

  <!-- A few groundling figures in the pit -->
  <g fill="#27272a" opacity="0.8">
    <circle cx="380" cy="510" r="6"/><rect x="376" y="514" width="8" height="14"/>
    <circle cx="420" cy="515" r="6"/><rect x="416" y="519" width="8" height="14"/>
    <circle cx="470" cy="512" r="6"/><rect x="466" y="516" width="8" height="14"/>
    <circle cx="520" cy="514" r="6"/><rect x="516" y="518" width="8" height="14"/>
    <circle cx="570" cy="510" r="6"/><rect x="566" y="514" width="8" height="14"/>
    <circle cx="620" cy="513" r="6"/><rect x="616" y="517" width="8" height="14"/>
  </g>

  <!-- Two seated patrons in the lord's room -->
  <g fill="#fde68a">
    <circle cx="475" cy="218" r="5"/>
    <circle cx="525" cy="218" r="5"/>
  </g>
</svg>
